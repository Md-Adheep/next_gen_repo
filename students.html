<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Approval — NextGen Technologies</title>
<link rel="stylesheet" href="css/shared.css">
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
  <div id="topbar-container"></div>
  <div class="page-body">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;" class="fade-in">
      <div>
        <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;">Student Management</h2>
        <p style="color:var(--muted);font-size:13px;">Approve enrollments and manage student profiles</p>
      </div>
      <button class="btn btn-primary" onclick="openModal('addStudentModal')">+ Add Student</button>
    </div>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;" class="fade-in">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;align-items:center;gap:14px;">
        <div style="font-size:28px;">👥</div>
        <div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;">248</div><div style="font-size:12px;color:var(--muted);">Total Students</div></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;align-items:center;gap:14px;">
        <div style="font-size:28px;">✅</div>
        <div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--success);">205</div><div style="font-size:12px;color:var(--muted);">Approved</div></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;align-items:center;gap:14px;">
        <div style="font-size:28px;">⏳</div>
        <div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--gold);">5</div><div style="font-size:12px;color:var(--muted);">Pending</div></div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;display:flex;align-items:center;gap:14px;">
        <div style="font-size:28px;">🎓</div>
        <div><div style="font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--accent);">38</div><div style="font-size:12px;color:var(--muted);">Completed</div></div>
      </div>
    </div>

    <!-- Tabs -->
    <div style="display:flex;gap:8px;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:0;" class="fade-in">
      <button class="tab-btn active" onclick="switchTab(this,'all')" style="background:none;border:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;padding:10px 18px;cursor:pointer;border-bottom:2px solid var(--accent);margin-bottom:-1px;">All Students</button>
      <button class="tab-btn" onclick="switchTab(this,'pending')" style="background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;">⏳ Pending (5)</button>
      <button class="tab-btn" onclick="switchTab(this,'approved')" style="background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;">✅ Approved</button>
      <button class="tab-btn" onclick="switchTab(this,'completed')" style="background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;">🎓 Completed</button>
    </div>

    <!-- Search -->
    <div style="display:flex;gap:12px;margin-bottom:18px;" class="fade-in">
      <div style="flex:1;position:relative;">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;">🔍</span>
        <input type="text" placeholder="Search students..." style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px 10px 36px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;" id="searchInput" oninput="filterStudents()">
      </div>
      <select style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;" id="courseFilter" onchange="filterStudents()">
        <option value="">All Courses</option>
        <option>Full Stack Development</option>
        <option>Data Science & ML</option>
        <option>Cybersecurity</option>
        <option>UI/UX Design</option>
        <option>AWS Cloud Computing</option>
      </select>
    </div>

    <!-- Table -->
    <div class="card fade-in">
      <div class="card-header">
        <div class="card-title">🎓 Students</div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-outline btn-sm" onclick="approveAll()">✅ Approve All Pending</button>
          <span style="font-size:12px;color:var(--muted);line-height:32px;" id="studentCount">13 students</span>
        </div>
      </div>
      <div class="card-body">
        <table>
          <thead>
            <tr><th>Student</th><th>Course</th><th>Phone</th><th>Enrolled Date</th><th>Progress</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="studentsTbody"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Add Student Modal -->
<div class="modal-overlay" id="addStudentModal">
  <div class="modal" style="width:640px;">
    <div class="modal-header">
      <h3>🎓 Add New Student</h3>
      <button class="modal-close" onclick="closeModal('addStudentModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group">
          <label class="lbl">First Name *</label>
          <input type="text" class="form-control" placeholder="First name" id="s_fname">
        </div>
        <div class="form-group">
          <label class="lbl">Last Name *</label>
          <input type="text" class="form-control" placeholder="Last name" id="s_lname">
        </div>
        <div class="form-group">
          <label class="lbl">Email *</label>
          <input type="email" class="form-control" placeholder="student@email.com" id="s_email">
        </div>
        <div class="form-group">
          <label class="lbl">Phone</label>
          <input type="tel" class="form-control" placeholder="+91 XXXXX XXXXX" id="s_phone">
        </div>
        <div class="form-group">
          <label class="lbl">Course *</label>
          <select class="form-control" id="s_course">
            <option value="">Select course</option>
            <option>Full Stack Development</option>
            <option>Data Science & ML</option>
            <option>Cybersecurity</option>
            <option>UI/UX Design</option>
            <option>AWS Cloud Computing</option>
            <option>DevOps Engineering</option>
          </select>
        </div>
        <div class="form-group">
          <label class="lbl">Qualification</label>
          <input type="text" class="form-control" placeholder="B.Tech, MCA, etc." id="s_qual">
        </div>
        <div class="form-group">
          <label class="lbl">Date of Birth</label>
          <input type="date" class="form-control" id="s_dob">
        </div>
        <div class="form-group">
          <label class="lbl">City</label>
          <input type="text" class="form-control" placeholder="City" id="s_city">
        </div>
        <div class="form-group form-full">
          <label class="lbl">Address</label>
          <textarea class="form-control" rows="2" placeholder="Full address..." id="s_addr"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addStudentModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addStudent()">🎓 Enroll Student</button>
    </div>
  </div>
</div>

<!-- View Student Modal -->
<div class="modal-overlay" id="viewStudentModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="vsTitle">Student Profile</h3>
      <button class="modal-close" onclick="closeModal('viewStudentModal')">✕</button>
    </div>
    <div class="modal-body" id="vsBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('viewStudentModal')">Close</button>
      <a href="certificates.html" class="btn btn-primary">📜 Issue Certificate</a>
    </div>
  </div>
</div>

<script>
let currentTab = 'all';
const statusColors = { Pending:'badge-warning', Approved:'badge-success', Completed:'badge-info', Rejected:'badge-danger' };

async function loadStudents() {
  const search = document.getElementById('searchInput')?.value || '';
  const status = currentTab === 'all' ? '' : currentTab.charAt(0).toUpperCase() + currentTab.slice(1);
  const params = new URLSearchParams({ action:'list' });
  if (status) params.append('status', status);
  if (search) params.append('search', search);

  const r = await fetch('api/students.php?' + params, { credentials: 'include' });
  const j = await r.json();
  const tbody = document.getElementById('studentsTbody');

  if (!j.success || !j.data.length) {
    tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="emoji">🎓</div><h3>No students found</h3><p>${currentTab==='all'?'Register your first student.':'No '+currentTab+' students.'}</p></div></td></tr>`;
    document.getElementById('studentCount').textContent = '0 students';
    return;
  }

  tbody.innerHTML = j.data.map(s => {
    const prog  = Math.round(parseFloat(s.avg_progress) || 0);
    const pColor = prog===100 ? 'var(--success)' : prog>50 ? 'var(--accent)' : 'var(--gold)';
    const ini   = (s.first_name[0] + (s.last_name[0]||'')).toUpperCase();
    const date  = new Date(s.registered_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar" style="font-size:12px;">${ini}</div>
        <div><div style="font-size:13px;font-weight:500;">${s.name}</div>
             <div style="font-size:11px;color:var(--muted);">ID: #${s.id}</div></div>
      </div></td>
      <td style="font-size:12px;">${s.courses || '—'}</td>
      <td style="font-size:12px;color:var(--muted);">${s.phone || '—'}</td>
      <td style="font-size:12px;color:var(--muted);">${date}</td>
      <td style="min-width:100px;">
        <div style="display:flex;align-items:center;gap:8px;">
          <div class="progress-bar-wrap" style="flex:1;"><div class="progress-bar-fill" style="width:${prog}%;background:${pColor};"></div></div>
          <span style="font-size:11px;color:var(--muted);width:28px;">${prog}%</span>
        </div>
      </td>
      <td><span class="badge ${statusColors[s.status]||''}">${s.status}</span></td>
      <td><div style="display:flex;gap:5px;flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm" onclick="viewStudent(${s.id})">👁️</button>
        ${s.status==='Pending'  ? `<button class="btn btn-success btn-sm" onclick="changeStatus(${s.id},'approve')">✅</button><button class="btn btn-danger btn-sm" onclick="changeStatus(${s.id},'reject')">✕</button>` : ''}
        ${s.status==='Approved' ? `<button class="btn btn-outline btn-sm" onclick="changeStatus(${s.id},'complete')">🎓</button>` : ''}
        ${s.status==='Completed'? `<a href="certificates.html" class="btn btn-primary btn-sm">📜</a>` : ''}
      </div></td>
    </tr>`;
  }).join('');
  document.getElementById('studentCount').textContent = j.data.length + ' students';
}

function filterStudents() { loadStudents(); }

function switchTab(el, tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => { b.style.color='var(--muted)'; b.style.borderBottom='2px solid transparent'; });
  el.style.color = 'var(--text)'; el.style.borderBottom = '2px solid var(--accent)';
  loadStudents();
}

async function changeStatus(id, action) {
  if (action==='reject' && !confirm('Reject this student?')) return;
  const r = await fetch(`api/students.php?action=${action}`, {
    method:'POST', credentials:'include', headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})
  });
  const j = await r.json();
  if (j.success) { loadStudents(); showToast(j.message); }
  else showToast('❌ '+j.message);
}

async function approveAll() {
  const r = await fetch('api/students.php?action=list&status=Pending', {credentials:'include'});
  const j = await r.json();
  if (j.success && j.data.length) {
    await Promise.all(j.data.map(s => fetch('api/students.php?action=approve',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({id:s.id})})));
    loadStudents(); showToast('✅ All pending approved!');
  }
}

async function viewStudent(id) {
  const r = await fetch(`api/students.php?action=get&id=${id}`, {credentials:'include'});
  const j = await r.json();
  if (!j.success) { showToast('❌ '+j.message); return; }
  const s = j.data;
  document.getElementById('vsTitle').textContent = '🎓 ' + s.name;
  const date = new Date(s.registered_at).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  const courses = s.enrollments?.map(e=>e.course_name).join(', ') || '—';
  const prog    = s.enrollments?.length ? Math.round(s.enrollments.reduce((a,e)=>a+parseInt(e.progress),0)/s.enrollments.length) : 0;
  document.getElementById('vsBody').innerHTML = `
    <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);">
      <div class="avatar" style="width:56px;height:56px;font-size:20px;border-radius:14px;">${(s.first_name[0]+(s.last_name[0]||'')).toUpperCase()}</div>
      <div><div style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;">${s.name}</div>
           <div style="font-size:13px;color:var(--muted);">ID: #${s.id}</div>
           <span class="badge ${statusColors[s.status]||''}" style="margin-top:4px;">${s.status}</span></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      ${[['📚 Course',courses],['📅 Registered',date],['📱 Phone',s.phone||'—'],['🏙️ City',s.city||'—'],['📧 Email',s.email],['🎓 Qualification',s.qualification||'—']].map(([k,v])=>`
      <div style="background:var(--surface2);border-radius:10px;padding:12px;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px;">${k}</div>
        <div style="font-size:13px;font-weight:500;">${v}</div>
      </div>`).join('')}
    </div>
    <div style="background:var(--surface2);border-radius:10px;padding:14px;">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px;">
        <span style="font-size:12px;color:var(--muted);">Avg Progress</span>
        <span style="font-size:12px;font-weight:600;">${prog}%</span>
      </div>
      <div class="progress-bar-wrap" style="height:10px;"><div class="progress-bar-fill" style="width:${prog}%;"></div></div>
    </div>`;
  openModal('viewStudentModal');
}

async function addStudent() {
  const fn = document.getElementById('s_fname').value.trim();
  const ln = document.getElementById('s_lname').value.trim();
  const cid = document.getElementById('s_course').value;
  if (!fn||!ln) { showToast('⚠️ First and last name required.'); return; }
  const r = await fetch('api/students.php?action=create', {
    method:'POST', credentials:'include', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      first_name:fn, last_name:ln,
      email: document.getElementById('s_email').value,
      phone: document.getElementById('s_phone').value,
      city:  document.getElementById('s_city').value,
      qualification: document.getElementById('s_qual').value,
      dob:   document.getElementById('s_dob').value,
      courses: cid ? [{course_id: cid}] : [],
    })
  });
  const j = await r.json();
  if (j.success) { closeModal('addStudentModal'); loadStudents(); showToast('🎓 Student enrolled!'); }
  else showToast('❌ '+j.message);
}

// Populate course dropdown from DB
async function loadCourseFilter() {
  const r = await fetch('api/courses.php?action=list', {credentials:'include'});
  const j = await r.json();
  if (!j.success) return;
  const sel = document.getElementById('courseFilter');
  const sel2 = document.getElementById('s_course');
  j.data.forEach(c => {
    [sel, sel2].forEach(s => { if(s){ const o=document.createElement('option'); o.value=c.id; o.textContent=c.name; s.appendChild(o); }});
  });
}

function openModal(id)  { document.getElementById(id)?.classList.add('show'); }
function closeModal(id) { document.getElementById(id)?.classList.remove('show'); }
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show');}));
function showToast(msg) {
  const t=document.createElement('div'); t.style.cssText='position:fixed;bottom:28px;right:28px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:13px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.4);'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

// Init
(async()=>{
  const r = await fetch('api/auth.php?action=me',{credentials:'include'});
  const j = await r.json();
  if(!j.success){location.href='login.html';return;}
  loadCourseFilter();
  loadStudents();
})();


</script>
</body>
</html>
