<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Course Profiles — NextGen Technologies</title>
<link rel="stylesheet" href="css/shared.css">
<style>
  .course-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; }
  .course-card {
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:16px;
    overflow:hidden;
    transition:all 0.25s;
  }
  .course-card:hover { transform:translateY(-4px); border-color:rgba(0,212,255,0.3); box-shadow:0 12px 40px rgba(0,0,0,0.3); }
  .course-thumb {
    height: 120px;
    display:flex; align-items:center; justify-content:center;
    font-size:48px;
    position:relative;
    overflow:hidden;
  }
  .course-thumb::after {
    content:'';
    position:absolute; inset:0;
    background:linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.4));
  }
  .course-info { padding:18px; }
  .course-name { font-family:'Syne',sans-serif; font-size:15px; font-weight:700; margin-bottom:6px; }
  .course-meta { display:flex; gap:12px; font-size:11px; color:var(--muted); margin-bottom:12px; }
  .course-meta span { display:flex; align-items:center; gap:4px; }
  .course-desc { font-size:12px; color:var(--muted); line-height:1.6; margin-bottom:14px; }
  .course-footer { display:flex; align-items:center; justify-content:space-between; padding-top:12px; border-top:1px solid var(--border); }
  .course-price { font-family:'Syne',sans-serif; font-size:16px; font-weight:800; color:var(--gold); }
</style>
</head>
<body>
<div id="sidebar-container"></div>
<div class="main-content">
  <div id="topbar-container"></div>
  <div class="page-body">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;" class="fade-in">
      <div>
        <h2 style="font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:4px;">Course Profiles</h2>
        <p style="color:var(--muted);font-size:13px;">Manage all training programs and course details</p>
      </div>
      <div style="display:flex;gap:10px;">
        <select style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;">
          <option>All Categories</option>
          <option>Technology</option>
          <option>Design</option>
          <option>Management</option>
        </select>
        <button class="btn btn-primary" onclick="openModal('addCourseModal')">+ Add Course</button>
      </div>
    </div>

    <!-- Stats Row -->
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;" class="fade-in">
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
        <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--accent);">18</div>
        <div style="font-size:12px;color:var(--muted);">Total Courses</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
        <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--success);">15</div>
        <div style="font-size:12px;color:var(--muted);">Active</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
        <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--gold);">248</div>
        <div style="font-size:12px;color:var(--muted);">Total Enrolled</div>
      </div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;text-align:center;">
        <div style="font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--accent2);">94%</div>
        <div style="font-size:12px;color:var(--muted);">Completion Rate</div>
      </div>
    </div>

    <!-- Courses Grid -->
    <div class="course-grid" id="coursesGrid"></div>

  </div>
</div>

<!-- Add Course Modal -->
<div class="modal-overlay" id="addCourseModal">
  <div class="modal" style="width:620px;">
    <div class="modal-header">
      <h3>📚 Add New Course</h3>
      <button class="modal-close" onclick="closeModal('addCourseModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group form-full">
          <label class="lbl">Course Name *</label>
          <input type="text" class="form-control" placeholder="e.g. Full Stack Web Development" id="c_name">
        </div>
        <div class="form-group">
          <label class="lbl">Category *</label>
          <select class="form-control" id="c_cat">
            <option value="">Select category</option>
            <option>Technology</option>
            <option>Design</option>
            <option>Management</option>
            <option>Finance</option>
          </select>
        </div>
        <div class="form-group">
          <label class="lbl">Duration</label>
          <input type="text" class="form-control" placeholder="e.g. 3 Months" id="c_dur">
        </div>
        <div class="form-group">
          <label class="lbl">Fee (₹)</label>
          <input type="number" class="form-control" placeholder="15000" id="c_fee">
        </div>
        <div class="form-group">
          <label class="lbl">Max Students</label>
          <input type="number" class="form-control" placeholder="30" id="c_max">
        </div>
        <div class="form-group">
          <label class="lbl">Instructor</label>
          <select class="form-control" id="c_inst">
            <option>Rohit Verma</option>
            <option>Anita Sharma</option>
            <option>Lata Nair</option>
          </select>
        </div>
        <div class="form-group">
          <label class="lbl">Start Date</label>
          <input type="date" class="form-control" id="c_start">
        </div>
        <div class="form-group form-full">
          <label class="lbl">Description</label>
          <textarea class="form-control" rows="3" placeholder="Course description..." id="c_desc"></textarea>
        </div>
        <div class="form-group form-full">
          <label class="lbl">Syllabus / Topics</label>
          <textarea class="form-control" rows="3" placeholder="List key topics covered..." id="c_syl"></textarea>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('addCourseModal')">Cancel</button>
      <button class="btn btn-primary" onclick="addCourse()">📚 Add Course</button>
    </div>
  </div>
</div>

<!-- View Course Modal -->
<div class="modal-overlay" id="viewCourseModal">
  <div class="modal" style="width:600px;">
    <div class="modal-header">
      <h3 id="vcTitle">Course Details</h3>
      <button class="modal-close" onclick="closeModal('viewCourseModal')">✕</button>
    </div>
    <div class="modal-body" id="vcBody"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('viewCourseModal')">Close</button>
      <button class="btn btn-primary" onclick="closeModal('viewCourseModal')">✏️ Edit Course</button>
    </div>
  </div>
</div>

<script>
async function loadCourses(){
  const search=document.getElementById('searchCourse')?.value||'';
  const cat=document.getElementById('filterCat')?.value||'';
  const params=new URLSearchParams({action:'list'});
  if(search) params.append('search',search);
  if(cat)    params.append('category',cat);
  const r=await fetch('api/courses.php?'+params,{credentials:'include'});
  const j=await r.json();
  const grid=document.getElementById('coursesGrid');
  if(!j.success||!j.data.length){
    grid.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:60px 20px;">
      <div style="font-size:44px;margin-bottom:12px;">📚</div>
      <div style="font-weight:700;font-size:16px;margin-bottom:6px;">No courses yet</div>
      <div style="font-size:13px;color:var(--muted);">Click "Add New Course" to create your first course.</div>
    </div>`;
    return;
  }
  grid.innerHTML=j.data.map(c=>{
    const color=c.color||'#7C3AED';
    const pct=c.max_students>0?Math.round((c.enrolled/c.max_students)*100):0;
    return `<div class="course-card fade-in">
      <div class="course-thumb" style="background:linear-gradient(135deg,${color}22,${color}44);">
        <span style="z-index:1;position:relative;">${c.emoji||'📚'}</span>
        <span style="position:absolute;top:10px;right:10px;background:var(--surface);border-radius:20px;padding:3px 10px;font-size:10px;color:${color};font-weight:600;z-index:2;">${c.category||'General'}</span>
      </div>
      <div class="course-info">
        <div class="course-name">${c.name}</div>
        <div class="course-meta">
          <span>⏱️ ${c.duration||'—'}</span>
          <span>👤 ${c.instructor||'—'}</span>
          <span style="color:${c.enrolled>=c.max_students?'var(--danger)':'var(--muted)'}">📊 ${c.enrolled}/${c.max_students}</span>
        </div>
        <div class="course-desc">${c.description||''}</div>
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;">
            <span>Enrollment</span><span>${pct}%</span></div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%;background:${color};"></div></div>
        </div>
        <div class="course-footer">
          <div class="course-price">₹${Number(c.fee).toLocaleString('en-IN')}</div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-outline btn-sm" onclick="viewCourse(${c.id})">👁️ View</button>
            <button class="btn btn-danger btn-sm" onclick="deleteCourse(${c.id})">🗑️</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function viewCourse(id){
  const r=await fetch(`api/courses.php?action=get&id=${id}`,{credentials:'include'});
  const j=await r.json();
  if(!j.success){showToast('Error loading course');return;}
  const c=j.data;
  document.getElementById('vcTitle').textContent=(c.emoji||'📚')+' '+c.name;
  document.getElementById('vcBody').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;">
      ${[['Category',c.category||'—'],['Duration',c.duration||'—'],['Fee','₹'+Number(c.fee).toLocaleString('en-IN')],['Instructor',c.instructor||'—'],['Enrolled',c.enrolled+'/'+c.max_students],['Status',c.status]].map(([k,v])=>`
      <div style="background:var(--surface2);border-radius:10px;padding:14px;">
        <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:5px;">${k}</div>
        <div style="font-size:14px;font-weight:600;">${v}</div>
      </div>`).join('')}
    </div>
    <div style="background:var(--surface2);border-radius:10px;padding:16px;">
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.08em;">Description</div>
      <p style="font-size:13px;line-height:1.7;">${c.description||'No description.'}</p>
    </div>`;
  openModal('viewCourseModal');
}

async function addCourse(){
  const name=document.getElementById('c_name').value.trim();
  if(!name){showToast('Course name required');return;}
  const body={
    name, category:document.getElementById('c_cat').value,
    emoji:document.getElementById('c_emoji')?.value||'📚',
    duration:document.getElementById('c_dur').value,
    fee:document.getElementById('c_fee').value||0,
    max_students:document.getElementById('c_max').value||30,
    instructor:document.getElementById('c_inst').value,
    description:document.getElementById('c_desc').value,
    color:document.getElementById('c_color')?.value||'#7C3AED',
    status:'Active'
  };
  const r=await fetch('api/courses.php?action=create',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const j=await r.json();
  if(j.success){closeModal('addCourseModal');loadCourses();showToast('📚 Course added!');}
  else showToast('❌ '+j.message);
}

async function deleteCourse(id){
  if(!confirm('Delete this course?'))return;
  const r=await fetch('api/courses.php?action=delete',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({id})});
  const j=await r.json();
  if(j.success){loadCourses();showToast('🗑️ Course removed');}
  else showToast('❌ '+j.message);
}

function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function showToast(msg){
  const t=document.createElement('div');t.style.cssText='position:fixed;bottom:28px;right:28px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 20px;font-size:13px;z-index:999;box-shadow:0 8px 32px rgba(0,0,0,0.4);';
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('show');}));

(async()=>{
  const r=await fetch('api/auth.php?action=me',{credentials:'include'});
  const j=await r.json();
  if(!j.success){location.href='login.html';return;}
  loadCourses();
})();
</script>
</body>
</html>
